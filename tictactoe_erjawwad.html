<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe - Jawwad</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 40px;
      background: #1e293b;
      border: none;
      cursor: pointer;
      color: white;
      border-radius: 10px;
    }

    .cell:hover {
      background: #334155;
    }

    .status {
      margin-top: 20px;
      font-size: 20px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<h1>🎮 Tic Tac Toe</h1>

<div class="board" id="board"></div>

<div class="status" id="status"></div>

<button class="btn" onclick="resetGame()">Restart Game</button>

<script>
  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let gameActive = true;

  let player1 = "";
  let player2 = "";

  const winningConditions = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const boardElement = document.getElementById("board");
  const statusText = document.getElementById("status");

  function initGame() {
    player1 = prompt("Enter Player 1 Name (X):");
    if (!player1) player1 = "Player 1";

    player2 = prompt("Enter Player 2 Name (O):");
    if (!player2) player2 = "Player 2";

    statusText.innerText = player1 + "'s Turn";
    createBoard();
  }

  function getPlayerName(symbol) {
    return symbol === "X" ? player1 : player2;
  }

  function createBoard() {
    boardElement.innerHTML = "";
    board.forEach((cell, index) => {
      const cellElement = document.createElement("button");
      cellElement.classList.add("cell");
      cellElement.innerText = cell;
      cellElement.onclick = () => handleClick(index);
      boardElement.appendChild(cellElement);
    });
  }

  function handleClick(index) {
    if (board[index] !== "" || !gameActive) return;

    board[index] = currentPlayer;
    createBoard();

    if (checkWinner()) return;

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.innerText = getPlayerName(currentPlayer) + "'s Turn";
  }

  function checkWinner() {
    for (let condition of winningConditions) {
      let [a, b, c] = condition;

      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        statusText.innerText = "🎉 " + getPlayerName(board[a]) + " Wins!";
        gameActive = false;
        return true;
      }
    }

    if (!board.includes("")) {
      statusText.innerText = "🤝 It's a Draw!";
      gameActive = false;
      return true;
    }

    return false;
  }

  function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    gameActive = true;
    statusText.innerText = player1 + "'s Turn";
    createBoard();
  }

  initGame();
</script>

</body>
</html>
