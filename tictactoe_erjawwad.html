<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe - Er Jawwad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  text-align: center;
  padding: 15px;
  background: #1e293b;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(56,189,248,0.4);
  width: 95%;
  max-width: 420px;
}

h1 { color: #38bdf8; }

.board {
  display: grid;
  gap: 6px;
  justify-content: center;
  margin-top: 20px;
  width: 100%;
}

.cell {
  aspect-ratio: 1/1;
  width: 100%;
  font-size: 4vw;
  background: #0f172a;
  border: 2px solid #38bdf8;
  color: #38bdf8;
  border-radius: 8px;
  cursor: pointer;
}

.status { margin-top: 15px; font-size: 16px; }

.btn {
  margin: 5px;
  padding: 8px 12px;
  background: #38bdf8;
  border: none;
  color: black;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

.score {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Tic Tac Toe</h1>
<h3>By: <b>Er Jawwad</b></h3>

<div id="mode">
  <button class="btn" onclick="startFriend()">👥 Friend</button>
  <button class="btn" onclick="showAIMode()">🤖 AI</button>
</div>

<div id="aiMode" style="display:none;">
  <button class="btn" onclick="startComputer('easy')">Easy 🫰</button>
  <button class="btn" onclick="startComputer('hard')">Hard 🔥</button>
</div>

<div id="board" class="board"></div>
<div id="status" class="status"></div>
<div id="score" class="score"></div>

<button class="btn" onclick="resetGame()">Restart</button>

</div>

<script>
let board=[], size=3;
let currentPlayer, gameActive, vsComputer, difficulty;

let player1="You", player2="A.I";
let scoreX=0, scoreO=0;

let level=1;
let maxLevel=7;
let winTarget=4;

const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");
const modeEl=document.getElementById("mode");
const aiModeEl=document.getElementById("aiMode");
const scoreEl=document.getElementById("score");

// SHOW AI OPTIONS
function showAIMode(){
 modeEl.style.display="none";
 aiModeEl.style.display="block";
}

// FRIEND
function startFriend(){
 player1=prompt("Player 1 (X):")||"Player 1";
 player2=prompt("Player 2 (O):")||"Player 2";
 vsComputer=false;
 modeEl.style.display="none";
 startLevel();
}

// AI START
function startComputer(levelAI){
 player1="You";
 player2="A.I";
 vsComputer=true;
 difficulty=levelAI;
 aiModeEl.style.display="none";
 startLevel();
}

// START LEVEL
function startLevel(){
 size = level + 2;
 board = Array(size*size).fill("");
 currentPlayer="X";
 gameActive=true;

 boardEl.style.display="grid";
 boardEl.style.gridTemplateColumns=`repeat(${size}, 1fr)`;

 draw();
 updateScore();

 statusEl.innerText=`Level ${level} | ${player1}'s Turn`;
}

// DRAW
function draw(){
 boardEl.innerHTML="";
 board.forEach((v,i)=>{
  let btn=document.createElement("button");
  btn.className="cell";
  btn.innerText=v;
  btn.onclick=()=>clickCell(i);
  boardEl.appendChild(btn);
 });
}

// CLICK
function clickCell(i){
 if(board[i]!=="" || !gameActive) return;

 board[i]=currentPlayer;
 draw();

 if(checkWin(currentPlayer)){
  if(currentPlayer==="X") scoreX++; else scoreO++;

  // FINAL WINNER
  if(scoreX===winTarget || scoreO===winTarget){
    statusEl.innerText=`🏆 ${name(currentPlayer)} Wins Tournament!`;
    endGame();
    return;
  }

  level++;
  if(level>maxLevel){
    statusEl.innerText="🏁 Game Over!";
    endGame();
    return;
  }

  statusEl.innerText=`🎉 ${name(currentPlayer)} won Level ${level-1}`;
  setTimeout(startLevel,800);
  return;
 }

 // DRAW
 if(!board.includes("")){
  statusEl.innerText="🤝 Match Draw!";
  endGame();
  return;
 }

 currentPlayer = currentPlayer==="X" ? "O" : "X";
 statusEl.innerText=name(currentPlayer)+" Turn";

 if(vsComputer && currentPlayer==="O"){
  setTimeout(computerMove,300);
 }
}

// END GAME (hide board)
function endGame(){
 gameActive=false;
 boardEl.style.display="none";
}

// NAME
function name(p){
 return p==="X"?player1:player2;
}

// WIN CHECK
function checkWin(p){
 for(let r=0;r<size;r++){
  let win=true;
  for(let c=0;c<size;c++){
    if(board[r*size+c]!==p) win=false;
  }
  if(win) return true;
 }

 for(let c=0;c<size;c++){
  let win=true;
  for(let r=0;r<size;r++){
    if(board[r*size+c]!==p) win=false;
  }
  if(win) return true;
 }

 let win=true;
 for(let i=0;i<size;i++){
  if(board[i*size+i]!==p) win=false;
 }
 if(win) return true;

 win=true;
 for(let i=0;i<size;i++){
  if(board[i*size+(size-i-1)]!==p) win=false;
 }
 return win;
}

// AI
function computerMove(){
 let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);

 let move;
 if(difficulty==="easy"){
   move=empty[Math.floor(Math.random()*empty.length)];
 } else {
   move=empty[0]; // simple hard logic (can improve later)
 }

 clickCell(move);
}

// SCORE
function updateScore(){
 scoreEl.innerText=`${player1}: ${scoreX} | ${player2}: ${scoreO}`;
}

// RESET
function resetGame(){
 level=1;
 scoreX=0;
 scoreO=0;
 boardEl.style.display="none";
 statusEl.innerText="";
 modeEl.style.display="block";
 aiModeEl.style.display="none";
}
</script>

</body>
</html>
